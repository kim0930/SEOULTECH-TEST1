
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="info-header" class="info-header"></div>
    <div class="theme-switch-wrapper">
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" />
            <div class="slider round"></div>
        </label>
    </div>
    <div class="container">
        <h1>Lotto Number Generator</h1>
        <button id="generate">Generate Numbers</button>
        <div id="numbers" class="numbers-container"></div>
    </div>

    <div class="container contact-container">
        <h2>제휴 문의</h2>
        <form action="https://formspree.io/f/xjgapgkd" method="POST" id="contact-form">
            <div class="form-group">
                <label for="name">성함/업체명</label>
                <input type="text" id="name" name="name" required placeholder="홍길동 / (주)컴퍼니">
            </div>
            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label for="subject">문의 제목</label>
                <input type="text" id="subject" name="subject" required placeholder="제휴 제안 드립니다">
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" required placeholder="상세한 문의 내용을 입력해주세요"></textarea>
            </div>
            <button type="submit" id="submit-btn">문의하기</button>
        </form>
    </div>
    <script src="main.js"></script>
</body>
</html>
